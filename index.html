<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黔中極客 · QZGeek</title>
    <style>
        :root {
            --paper: #f4edda;
            --paper-dark: #ece3cc;
            --ink: #3a3226;
            --light-ink: #6b6050;
            --red: #b84040;
            --gold: #a08050;
            --border: #c8b898;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif TC', 'Source Han Serif TC', 'MingLiU', 'PMingLiU', 'STSong', 'SimSun', 'AR PL UMing CN', '宋体', serif;
            background: #d9d0b8;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,119,90,0.03) 3px);
            color: var(--ink);
            min-height: 100vh;
            line-height: 2;
            display: flex;
            justify-content: center;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Book container */
        .book {
            max-width: 580px;
            width: 100%;
            margin: 2rem 1rem;
            background: var(--paper);
            box-shadow:
                2px 3px 10px rgba(0,0,0,0.12),
                inset 0 0 60px rgba(139,119,90,0.06);
            position: relative;
            padding: 3rem 2.5rem 2.5rem;
        }
        /* Double border - classic thread-bound book style */
        .book::before {
            content: '';
            position: absolute;
            top: 1rem; left: 1rem; right: 1rem; bottom: 1.2rem;
            border: 1px solid var(--border);
            pointer-events: none;
        }
        .book::after {
            content: '';
            position: absolute;
            top: 1.3rem; left: 1.3rem; right: 1.3rem; bottom: 1.5rem;
            border: 0.5px solid rgba(200,184,152,0.5);
            pointer-events: none;
        }

        /* Stitching dots on left side */
        .stitches {
            position: absolute; left: 0.5rem; top: 5rem; bottom: 4rem;
            width: 6px;
            display: flex; flex-direction: column; gap: 2.5rem;
            align-items: center;
            pointer-events: none; z-index: 2;
        }
        .stitches span {
            width: 4px; height: 4px;
            background: var(--border);
            border-radius: 50%;
        }

        .book-inner { position: relative; z-index: 1; text-align: center; }

        /* Central column (版心) */
        .center-column {
            position: absolute; left: 50%; top: 2rem; bottom: 2rem;
            width: 0; pointer-events: none; z-index: 0;
        }
        .center-column::before {
            content: '';
            position: absolute; left: 50%; top: 0; bottom: 0;
            width: 1px; background: rgba(200,184,152,0.4);
            transform: translateX(-50%);
        }
        /* Fish-tail markers */
        .fish-tail-top, .fish-tail-bottom {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 16px; height: 8px;
            pointer-events: none; z-index: 0;
        }
        .fish-tail-top {
            top: 1.8rem;
            background: linear-gradient(180deg, transparent 40%, var(--border) 40%, var(--border) 60%, transparent 60%);
            border-radius: 0 0 50% 50%;
        }
        .fish-tail-bottom {
            bottom: 1.8rem;
            background: linear-gradient(0deg, transparent 40%, var(--border) 40%, var(--border) 60%, transparent 60%);
            border-radius: 50% 50% 0 0;
        }

        /* Hero */
        .hero { padding: 1rem 0 1.5rem; }
        .avatar-frame {
            display: inline-block;
            padding: 6px;
            background: var(--paper);
            border: 2px solid var(--border);
            border-radius: 50%;
            margin-bottom: 1.8rem;
            box-shadow: 0 0 0 1px rgba(200,184,152,0.3);
        }
        .avatar-frame img {
            width: 120px; height: 120px;
            border-radius: 50%;
            display: block;
            border: 2px solid var(--paper-dark);
        }
        .hero h1 {
            font-size: 2.6rem; font-weight: 500;
            letter-spacing: 0.2em;
        }
        .hero .eng {
            font-size: 0.85rem; color: var(--light-ink);
            letter-spacing: 0.4em;
            font-style: italic;
            margin-top: 0.3rem;
        }
        /* 界行 — chapter divider */
        .chapter-mark {
            display: flex; align-items: center;
            justify-content: center; gap: 0.6rem;
            margin: 1.2rem 0;
            font-size: 0.65rem; color: var(--red);
        }
        .chapter-mark::before, .chapter-mark::after {
            content: ''; width: 28px; height: 1px;
            background: var(--red); opacity: 0.4;
        }

        /* Poem */
        .poem-box {
            text-align: center; padding: 1.5rem 0.5rem;
            margin: 0.5rem 0 2rem;
        }
        .poem-box p {
            font-size: 1.05rem; color: var(--light-ink);
            line-height: 2.5; letter-spacing: 0.06em;
        }
        .poem-box .verses {
            display: inline-block; text-align: left;
        }

        /* Links */
        .link-bar {
            display: flex; gap: 1rem; justify-content: center;
            flex-wrap: wrap; margin: 0 0 2.5rem;
        }
        .link-bar a {
            padding: 0.3rem 1.2rem;
            border: 1px solid var(--border);
            text-decoration: none; color: var(--ink);
            font-size: 0.82rem; letter-spacing: 0.06em;
            transition: all 0.3s;
        }
        .link-bar a:hover {
            border-color: var(--red);
            color: var(--red);
        }

        /* Section headings */
        .section-head {
            text-align: center; margin: 2rem 0 1.2rem;
            font-size: 0.78rem; color: var(--gold);
            letter-spacing: 0.25em;
            display: flex; align-items: center;
            justify-content: center; gap: 0.5rem;
        }
        .section-head span {
            display: inline-block; width: 20px;
            border-top: 1px solid var(--border);
        }

        /* About card */
        .about {
            text-align: center; padding: 1.2rem;
            background: var(--paper-dark);
            margin: 0 auto; max-width: 360px;
            font-size: 0.88rem; color: var(--light-ink);
            line-height: 2.2;
        }
        .about strong { color: var(--ink); font-weight: 500; }

        /* Stats */
        .stats {
            text-align: center; padding: 1rem;
            background: var(--paper-dark);
            margin: 0 auto; max-width: 460px;
        }
        .stats img { max-width: 100%; height: auto; }

        /* Colophon */
        .colophon {
            text-align: center; padding: 2.5rem 0 1rem;
            font-size: 0.72rem; color: var(--light-ink);
            letter-spacing: 0.1em; line-height: 2;
        }
        .colophon .chop {
            display: inline-block; width: 34px; height: 34px;
            border: 1.5px solid var(--red);
            color: var(--red); line-height: 32px;
            font-size: 0.65rem; margin-bottom: 0.4rem;
        }
        .colophon .era {
            color: var(--gold); font-size: 0.68rem;
        }

        /* Tea stains */
        .stain {
            position: absolute; pointer-events: none; z-index: 0;
            border-radius: 50%; opacity: 0.04;
            background: radial-gradient(circle, #8b775a 0%, transparent 70%);
        }
        .stain-1 { width: 60px; height: 60px; top: 15%; right: 8%; }
        .stain-2 { width: 40px; height: 40px; bottom: 20%; left: 10%; }

        @media (max-width: 500px) {
            .book { margin: 0.5rem; padding: 2rem 1.2rem 1.5rem; }
            .book::before { top: 0.5rem; left: 0.5rem; right: 0.5rem; bottom: 0.6rem; }
            .book::after { top: 0.7rem; left: 0.7rem; right: 0.7rem; bottom: 0.9rem; }
            .hero h1 { font-size: 2rem; }
            .avatar-frame img { width: 96px; height: 96px; }
            .stitches { display: none; }
        }
    </style>
</head>
<body>
    <div class="book">
        <!-- Stitching -->
        <div class="stitches">
            <span></span><span></span><span></span><span></span><span></span>
        </div>

        <!-- Tea stains -->
        <div class="stain stain-1"></div>
        <div class="stain stain-2"></div>

        <!-- Central column markers -->
        <div class="center-column"></div>
        <div class="fish-tail-top"></div>
        <div class="fish-tail-bottom"></div>

        <div class="book-inner">
            <!-- Hero -->
            <header class="hero">
                <div class="avatar-frame">
                    <img src="https://avatars.githubusercontent.com/u/160110426?v=4" alt="QZGeek">
                </div>
                <h1>黔中極客</h1>
                <p class="eng">QZGeek</p>
                <div class="chapter-mark">◆</div>
            </header>

            <!-- Poem -->
            <div class="poem-box">
                <div class="verses">
                    <p>
                        初夏新葉替落紅，春景不存。<br>
                        夕陽斜照城西樓，暮色遲留。
                    </p>
                </div>
            </div>

            <!-- Links -->
            <div class="link-bar">
                <a href="https://www.qzgeek.cn">📝 博客</a>
                <a href="https://github.com/qzgeek">🐙 GitHub</a>
                <a href="mailto:xcgeek@163.com">✉️ 郵件</a>
            </div>

            <!-- About -->
            <div class="section-head">
                <span></span> 關於 <span></span>
            </div>
            <div class="about">
                <p>
                    嗨，我是<strong>黔中極客</strong><br>
                    一個熱愛技術的在讀學生<br>
                    也是開源社區的新人
                </p>
                <p style="margin-top:0.6rem; font-size:0.8rem;">
                    💻 搗鼓代碼 · ☁️ 折騰服務器 · 🖋 偶爾寫詩
                </p>
            </div>

            <!-- Stats -->
            <div class="section-head">
                <span></span> 統計 <span></span>
            </div>
            <div class="stats">
                <img src="https://awesome-github-stats.azurewebsites.net/user-stats/qzgeek?cardType=level&theme=tokyonight&preferLogin=false" alt="GitHub Stats" loading="lazy">
            </div>

            <!-- Colophon -->
            <div class="colophon">
                <div class="chop">黔</div>
                <p class="era">丙午年 · 夏</p>
                <p>黔中極客 手書</p>
            </div>
        </div>
    </div>
</body>
</html>
