<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黔中极客 · QZGeek</title>
    <style>
        :root {
            --ink: #2c2c2c;
            --paper: #faf7f2;
            --paper2: #f0ebe0;
            --vermillion: #c04040;
            --gold: #b8944e;
            --jade: #5b8c5a;
            --celadon: #8fbfb0;
            --mist: #d4cfc4;
            --light-ink: #6b6b6b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* Ink wash mountain background */
        .mountains {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; opacity: 0.06;
        }
        .mountains svg { width: 100%; height: 100%; }

        .container { max-width: 680px; margin: 0 auto; padding: 0 1.5rem; position: relative; z-index: 1; }

        /* Hero */
        .hero {
            text-align: center;
            padding: 5rem 0 3rem;
        }
        .fox {
            display: inline-block;
            position: relative;
            animation: foxFloat 4s ease-in-out infinite;
        }
        @keyframes foxFloat {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-6px) rotate(2deg); }
        }
        .fox svg { width: 100px; height: 100px; }

        .hero h1 {
            font-size: 2.6rem; font-weight: 400;
            color: var(--ink);
            margin: 1rem 0 0.3rem;
            letter-spacing: 0.15em;
        }
        .hero .english {
            font-size: 0.95rem;
            color: var(--light-ink);
            letter-spacing: 0.3em;
            font-family: 'Georgia', 'Noto Serif SC', serif;
            font-style: italic;
        }
        .hero .divider {
            width: 40px; height: 2px;
            background: var(--vermillion);
            margin: 1rem auto;
            border-radius: 1px;
        }

        /* Poem */
        .poem {
            text-align: center;
            padding: 2rem 1.5rem;
            margin: 0 0 2.5rem;
            border-top: 1px solid var(--mist);
            border-bottom: 1px solid var(--mist);
            position: relative;
        }
        .poem::before, .poem::after {
            content: '◆';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: var(--vermillion);
            font-size: 0.5rem;
            opacity: 0.6;
        }
        .poem::before { top: -0.4rem; }
        .poem::after { bottom: -0.4rem; }
        .poem p {
            font-size: 1.1rem;
            color: var(--light-ink);
            line-height: 2.4;
            font-style: italic;
        }

        /* Links */
        .links {
            display: flex; gap: 1.5rem;
            justify-content: center; flex-wrap: wrap;
            margin: 0 0 3rem;
        }
        .links a {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.5rem 1.6rem;
            border-radius: 0;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
            color: var(--ink);
            font-family: inherit;
        }
        .links a:hover { border-bottom-color: var(--vermillion); color: var(--vermillion); }

        /* Section */
        .section {
            margin: 2.5rem 0;
        }
        .section-title {
            text-align: center;
            font-size: 1.1rem; font-weight: 400;
            color: var(--gold);
            letter-spacing: 0.15em;
            margin-bottom: 1.5rem;
            display: flex; align-items: center; justify-content: center; gap: 0.8rem;
        }
        .section-title::before, .section-title::after {
            content: '';
            width: 30px; height: 1px;
            background: var(--mist);
        }

        /* About */
        .about-text {
            text-align: center;
            max-width: 420px; margin: 0 auto;
            color: var(--light-ink);
            font-size: 0.95rem;
            line-height: 2;
        }
        .about-text .highlight {
            color: var(--vermillion);
        }

        /* Tags */
        .tag-row {
            display: flex; gap: 0.6rem; justify-content: center;
            flex-wrap: wrap; margin: 1.5rem 0;
        }
        .tag {
            padding: 0.3rem 1rem;
            border: 1px solid var(--mist);
            font-size: 0.8rem;
            color: var(--light-ink);
            transition: all 0.3s;
            cursor: default;
        }
        .tag:hover {
            border-color: var(--vermillion);
            color: var(--vermillion);
            background: rgba(192,64,64,0.04);
        }

        /* Stats card */
        .stats-card {
            text-align: center;
            padding: 2rem 1rem;
            background: var(--paper2);
            border-radius: 2px;
            margin: 0 auto;
            max-width: 480px;
        }
        .stats-card img {
            max-width: 100%; height: auto;
            border-radius: 2px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 4rem 1rem 3rem;
            color: var(--mist);
            font-size: 0.8rem;
            letter-spacing: 0.08em;
        }
        footer .stamp {
            display: inline-block;
            width: 36px; height: 36px;
            border: 2px solid var(--vermillion);
            border-radius: 50%;
            color: var(--vermillion);
            font-size: 0.7rem;
            line-height: 32px;
            margin-bottom: 0.8rem;
            opacity: 0.6;
        }

        /* Floating petals */
        .petal {
            position: fixed;
            pointer-events: none; z-index: 0;
            animation: fall linear forwards;
            opacity: 0.15;
            font-size: 1.2rem;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.2; }
            90% { opacity: 0.15; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .hero h1 { font-size: 2rem; }
            .hero { padding: 3rem 0 2rem; }
            .fox svg { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>

    <!-- Mountains background SVG -->
    <div class="mountains">
        <svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,450 Q100,350 200,400 Q300,300 400,380 Q500,280 600,350 Q700,310 800,370 L800,600 L0,600Z" fill="currentColor"/>
            <path d="M0,480 Q150,420 300,450 Q450,390 550,430 Q650,400 800,440 L800,600 L0,600Z" fill="currentColor" opacity="0.6"/>
            <path d="M0,520 Q200,480 400,510 Q600,470 800,520 L800,600 L0,600Z" fill="currentColor" opacity="0.3"/>
            <circle cx="680" cy="200" r="60" fill="currentColor" opacity="0.05"/>
            <circle cx="150" cy="250" r="40" fill="currentColor" opacity="0.04"/>
        </svg>
    </div>

    <!-- Floating petals -->
    <div id="petals"></div>

    <div class="container">
        <!-- Hero -->
        <header class="hero">
            <div class="fox">
                <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                    <!-- Body -->
                    <ellipse cx="60" cy="85" rx="28" ry="22" fill="#d4a574"/>
                    <!-- Head -->
                    <ellipse cx="60" cy="55" rx="24" ry="20" fill="#e8c99b"/>
                    <!-- Left ear -->
                    <polygon points="38,40 30,15 48,32" fill="#d4a574"/>
                    <polygon points="39,37 34,22 46,33" fill="#f5d6c6"/>
                    <!-- Right ear -->
                    <polygon points="82,40 90,15 72,32" fill="#d4a574"/>
                    <polygon points="81,37 86,22 74,33" fill="#f5d6c6"/>
                    <!-- Eyes -->
                    <ellipse cx="50" cy="52" rx="3.5" ry="4" fill="#2c2c2c"/>
                    <ellipse cx="70" cy="52" rx="3.5" ry="4" fill="#2c2c2c"/>
                    <circle cx="51" cy="50" r="1.2" fill="white"/>
                    <circle cx="71" cy="50" r="1.2" fill="white"/>
                    <!-- Nose -->
                    <ellipse cx="60" cy="58" rx="3" ry="2" fill="#c04040"/>
                    <!-- Mouth -->
                    <path d="M55,61 Q60,65 65,61" fill="none" stroke="#2c2c2c" stroke-width="0.8"/>
                    <!-- Blush -->
                    <ellipse cx="46" cy="57" rx="4" ry="2.5" fill="#e8a0a0" opacity="0.5"/>
                    <ellipse cx="74" cy="57" rx="4" ry="2.5" fill="#e8a0a0" opacity="0.5"/>
                    <!-- Tail -->
                    <path d="M85,80 Q105,65 95,45 Q92,38 90,42 Q88,55 82,70" fill="#d4a574" stroke="#c4a064" stroke-width="0.5"/>
                    <path d="M85,80 Q105,65 95,45 Q92,38 90,42 Q88,55 82,70" fill="#f5d6c6" opacity="0.6"/>
                </svg>
            </div>
            <h1>黔中极客</h1>
            <p class="english">QZGeek</p>
            <div class="divider"></div>
        </header>

        <!-- Poem -->
        <div class="poem">
            <p>
                初夏新叶替落红，春景不存。<br>
                夕阳斜照城西楼，暮色迟留。
            </p>
        </div>

        <!-- Links -->
        <div class="links">
            <a href="https://qzgeek.cn">🌐 主页</a>
            <a href="https://github.com/qzgeek">🐙 GitHub</a>
            <a href="mailto:xcgeek@163.com">✉️ 邮件</a>
        </div>

        <!-- About -->
        <div class="section">
            <div class="section-title">关于</div>
            <div class="about-text">
                <p>
                    嗨，我是<span class="highlight">黔中极客</span>——
                    一个热爱技术的在读学生，<br>
                    也是开源社区的新人。
                </p>
            </div>
            <div class="tag-row">
                <span class="tag">📚 在读</span>
                <span class="tag">💻 代码</span>
                <span class="tag">🖋 诗词</span>
                <span class="tag">☁️ 服务器</span>
                <span class="tag">🏔 黔地</span>
            </div>
        </div>

        <!-- GitHub Stats -->
        <div class="section">
            <div class="section-title">统计</div>
            <div class="stats-card">
                <img src="https://awesome-github-stats.azurewebsites.net/user-stats/qzgeek?cardType=level&theme=tokyonight&preferLogin=false" alt="GitHub Stats" loading="lazy">
            </div>
        </div>

        <!-- Footer -->
        <footer>
            <div class="stamp">印</div>
            <p>黔中极客 · 二〇二六</p>
        </footer>
    </div>

    <script>
    // Floating petals
    const petals = ['🌸', '🍂', '🌺', '🍃', '✿'];
    const container = document.getElementById('petals');
    setInterval(() => {
        const p = document.createElement('span');
        p.className = 'petal';
        p.textContent = petals[Math.floor(Math.random() * petals.length)];
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (8 + Math.random() * 12) + 's';
        p.style.animationDelay = '0s';
        container.appendChild(p);
        setTimeout(() => p.remove(), 20000);
    }, 3000);
    </script>
</body>
</html>
