<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黔中極客 · QZGeek</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@latest/style.css">
    <style>
        :root {
            --bg: #faf8f3;
            --card: #f4f0e8;
            --ink: #3a3632;
            --muted: #8c867a;
            --red: #b84c4c;
            --gold: #b8945c;
            --jade: #7a9e8a;
            --line: #e0d9cb;
            --light: #ede7d9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'LXGW WenKai', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--ink);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(circle at 85% 5%, rgba(122,158,138,0.04) 0%, transparent 40%),
                radial-gradient(circle at 15% 90%, rgba(184,148,92,0.03) 0%, transparent 40%);
        }

        body::after {
            content: ''; position: fixed; inset: 0;
            pointer-events: none; z-index: 0; opacity: 0.012;
            background: repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(58,54,50,0.3) 3px);
        }

        .container { max-width: 660px; margin: 0 auto; padding: 0 1.5rem; position: relative; z-index: 1; }

        /* ── Hero ── */
        .hero {
            text-align: center;
            padding: 3rem 0 1rem;
        }
        .avatar-ring {
            display: inline-block;
            padding: 4px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--jade), var(--gold));
            margin-bottom: 1.2rem;
        }
        .avatar-ring img {
            width: 130px; height: 130px;
            border-radius: 50%; display: block;
            border: 4px solid var(--bg);
        }
        .hero h1 {
            font-size: 3rem; font-weight: 600;
            letter-spacing: 0.12em;
            font-family: 'LXGW WenKai', 'Noto Serif SC', 'STSong', serif;
        }
        .hero .sub {
            font-size: 1rem; color: var(--muted);
            letter-spacing: 0.35em; margin-top: 0.4rem;
            font-weight: 300;
        }

        /* ── Poem ── */
        .poem-strip {
            text-align: center;
            padding: 1.5rem 1rem; margin: 1rem 0 2rem;
            border-top: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
        }
        .poem-strip p {
            font-family: 'LXGW WenKai', 'Noto Serif SC', 'STSong', serif;
            font-size: 1.2rem; color: var(--muted);
            line-height: 2.4; letter-spacing: 0.05em;
        }
        .poem-strip .dot {
            display: inline-block; width: 6px; height: 6px;
            border-radius: 50%; background: var(--red);
            margin-top: 1.2rem; opacity: 0.4;
        }

        /* ── Links ── */
        .link-bar {
            display: flex; gap: 0.8rem; justify-content: center;
            flex-wrap: wrap; margin: 0 0 3rem;
        }
        .link-bar a {
            padding: 0.55rem 1.6rem;
            border: 1px solid var(--line);
            border-radius: 22px;
            text-decoration: none; color: var(--ink);
            font-size: 0.95rem; letter-spacing: 0.04em;
            transition: all 0.3s;
            font-weight: 400;
        }
        .link-bar {
            display: flex; gap: 0.8rem; justify-content: center;
            flex-wrap: wrap; margin: 0 0 1.5rem;
        }
        .link-bar a:hover {
            border-color: var(--red); color: var(--red);
            background: rgba(184,76,76,0.03);
        }

        /* ── Dividers ── */
        .divider {
            display: flex; align-items: center;
            justify-content: center; gap: 1rem;
            margin: 1.5rem 0; opacity: 0.5;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; max-width: 60px;
            height: 1px; background: var(--line);
        }
        .divider .icon { font-size: 0.8rem; color: var(--muted); }

        /* ── Section ── */
        .section-head {
            text-align: center;
            font-size: 0.9rem; color: var(--gold);
            letter-spacing: 0.2em; margin-bottom: 1rem;
            font-weight: 400;
        }

        /* ── Project cards ── */
        .project-card {
            background: var(--card); border-radius: 14px;
            padding: 1rem 1.4rem; margin: 0.5rem 0;
            display: flex; align-items: center; gap: 1.2rem;
            transition: all 0.25s; border: 1px solid transparent;
        }
        .project-card:hover {
            border-color: var(--line);
            transform: translateX(2px);
        }
        .project-card .p-icon {
            font-size: 1.8rem; min-width: 2.2rem; text-align: center;
        }
        .project-card .p-info { flex: 1; }
        .project-card .p-name {
            font-size: 1rem; font-weight: 500;
        }
        .project-card .p-desc {
            font-size: 0.85rem; color: var(--muted);
            margin-top: 0.2rem;
        }
        .project-card .p-star {
            font-size: 0.85rem; color: var(--gold);
            white-space: nowrap;
        }
        .more-link {
            text-align: center; margin-top: 1.2rem;
        }
        .more-link a {
            font-size: 0.9rem; color: var(--jade);
            text-decoration: none;
            border-bottom: 1px dashed var(--jade);
            padding-bottom: 2px;
        }

        /* ── Stats ── */
        .stats-card {
            background: var(--card); border-radius: 14px;
            padding: 1.2rem; text-align: center;
            max-width: 480px; margin: 0 auto;
        }

        /* ── Footer ── */
        footer {
            text-align: center; padding: 2.5rem 1rem 2rem;
            color: var(--muted); font-size: 0.85rem;
            letter-spacing: 0.08em; font-weight: 300;
            line-height: 2;
        }
        footer .mark {
            display: block; width: 7px; height: 7px;
            border-radius: 50%; background: var(--red);
            opacity: 0.3; margin: 0 auto 1rem;
        }
        .stats-card img { max-width: 100%; height: auto; border-radius: 8px; }

        @media (max-width: 500px) {
            .hero { padding: 3rem 0 1.5rem; }
            .hero h1 { font-size: 2.2rem; }
            .avatar-ring img { width: 84px; height: 84px; }
            .poem-strip p { font-size: 0.95rem; }
            .project-card { flex-direction: column; text-align: center; gap: 0.4rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ═══ Hero ═══ -->
        <header class="hero">
            <div class="avatar-ring">
                <img src="https://avatars.githubusercontent.com/u/160110426?v=4" alt="QZGeek">
            </div>
            <h1>黔中極客</h1>
            <p class="sub">QZGeek</p>
        </header>

        <!-- ═══ Poem ═══ -->
        <div class="poem-strip">
            <p>
                初夏新葉替落紅，春景不存。<br>
                夕陽斜照城西樓，暮色遲留。
            </p>
            <div class="dot"></div>
        </div>

        <!-- ═══ Links ═══ -->
        <div class="link-bar">
            <a href="https://www.qzgeek.cn">📝 博客</a>
            <a href="https://github.com/qzgeek">🐙 GitHub</a>
            <a href="mailto:xcgeek@163.com">✉️ 郵件</a>
        </div>

        <div class="divider"><span class="icon">◈</span></div>

        <!-- ═══ Projects ═══ -->
        <div class="section-head">倉 庫</div>
        <div class="project-card">
            <span class="p-icon">🏠</span>
            <div class="p-info">
                <p class="p-name">qzgeek/qzgeek</p>
                <p class="p-desc">個人主頁 · GitHub 檔案</p>
            </div>
            <span class="p-star">📌</span>
        </div>
        <div class="project-card">
            <span class="p-icon">📊</span>
            <div class="p-info">
                <p class="p-name">GitHub 統計</p>
                <p class="p-desc">開源貢獻與活動記錄</p>
            </div>
            <span class="p-star">📌</span>
        </div>
        <p class="more-link">
            <a href="https://github.com/qzgeek?tab=repositories">查看全部倉庫 →</a>
        </p>

        <div class="divider"><span class="icon">◈</span></div>

        <!-- ═══ Stats ═══ -->
        <div class="section-head">統 計</div>
        <div class="stats-card">
            <img src="https://awesome-github-stats.azurewebsites.net/user-stats/qzgeek?cardType=level&theme=tokyonight&preferLogin=false" alt="GitHub" loading="lazy">
        </div>

        <!-- ═══ Footer ═══ -->
        <footer>
            <span class="mark"></span>
            <p>二〇二六 · 夏<br>黔中極客</p>
        </footer>
    </div>
</body>
</html>
