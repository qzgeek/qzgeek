<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黔中极客 · QZGeek</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --muted: #8b949e;
            --green: #3fb950;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }
        .container { max-width: 720px; width: 100%; }
        .hero {
            text-align: center;
            padding: 3rem 1rem 2rem;
        }
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        .hero .subtitle {
            color: var(--muted);
            font-size: 1.1rem;
            letter-spacing: 0.05em;
        }
        .poem {
            text-align: center;
            padding: 1.5rem;
            margin: 1rem 0 2rem;
            border-left: 3px solid var(--border);
            border-right: 3px solid var(--border);
            color: var(--muted);
            font-style: italic;
            line-height: 2;
            font-size: 1.05rem;
        }
        .links {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 1.5rem 0;
        }
        .links a {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1.2rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .links a:hover {
            border-color: var(--accent);
            background: rgba(88,166,255,0.1);
        }
        .links a.website { border-color: var(--accent); color: var(--accent); }
        .links a.email { border-color: #ea4335; color: #ea4335; }
        .links a.github { border-color: var(--green); color: var(--green); }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            text-align: center;
        }
        .card h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--muted);
            font-weight: 500;
        }
        .card img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }
        .about {
            text-align: center;
            padding: 1rem 0;
            color: var(--muted);
            line-height: 1.8;
        }
        .about strong { color: var(--text); }
        footer {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--muted);
            font-size: 0.85rem;
        }
        @media (max-width: 600px) {
            .hero h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Hero -->
        <div class="hero">
            <h1>黔中极客</h1>
            <p class="subtitle">QZGeek</p>
        </div>

        <!-- Poem -->
        <div class="poem">
            初夏新叶替落红，春景不存。<br>
            夕阳斜照城西楼，暮色迟留。
        </div>

        <!-- Links -->
        <div class="links">
            <a href="https://qzgeek.cn" class="website" target="_blank">🌐 qzgeek.cn</a>
            <a href="https://github.com/qzgeek" class="github" target="_blank">🐙 GitHub</a>
            <a href="mailto:xcgeek@163.com" class="email">📧 Email</a>
        </div>

        <!-- About -->
        <div class="about">
            嗨！我是 <strong>黔中极客</strong>，一个来自中国、热爱技术的在读学生，也是开源社区的新人。<br>
            喜欢捣鼓服务器、折腾代码，偶尔写写诗 📝
        </div>

        <!-- Streak Stats -->
        <div class="card">
            <h2>📊 提交统计</h2>
            <img src="https://streak-stats.demolab.com?user=qzgeek&theme=tokyonight&hide_border=true&locale=zh" alt="连续提交统计" loading="lazy">
        </div>

        <!-- Contribution Graph -->
        <div class="card">
            <h2>🗓 贡献日历</h2>
            <img src="https://ghchart.rshah.org/qzgeek" alt="贡献热力图" loading="lazy">
        </div>

        <footer>
            © 2025–2026 黔中极客 · Built with ❤️ on GitHub Pages
        </footer>
    </div>
</body>
</html>
