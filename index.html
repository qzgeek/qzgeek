<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黔中极客 · QZGeek</title>
    <style>
        :root {
            --ink: #333;
            --paper: #faf7f2;
            --soft-paper: #f3efe8;
            --vermillion: #b84040;
            --gold: #b8944e;
            --jade: #6b9e7a;
            --mist: #c5bfb0;
            --light: #8a8a80;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif SC', 'STSong', 'Songti SC', 'SimSun', serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        /* Ink mountain background */
        .bg-mountains {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background:
                radial-gradient(ellipse 60% 50% at 50% 100%, rgba(107,158,122,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 40% 30% at 20% 20%, rgba(184,148,78,0.03) 0%, transparent 50%);
        }

        /* Horizontal rule pattern */
        .bg-lines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; opacity: 0.02;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 39px, var(--ink) 40px
            );
        }

        .container { max-width: 600px; margin: 0 auto; padding: 0 1.5rem; position: relative; z-index: 1; }

        /* Hero */
        .hero {
            text-align: center;
            padding: 4rem 0 2rem;
        }
        .avatar-wrap {
            display: inline-block;
            padding: 4px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--mist), var(--gold), var(--jade));
            margin-bottom: 1.5rem;
            animation: gentlePulse 4s ease-in-out infinite;
        }
        @keyframes gentlePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(184,148,78,0.15); }
            50% { box-shadow: 0 0 0 12px rgba(184,148,78,0); }
        }
        .hero .avatar {
            width: 96px; height: 96px;
            border-radius: 50%;
            display: block;
            border: 3px solid var(--paper);
        }
        .hero h1 {
            font-size: 2.4rem; font-weight: 400;
            margin: 0.8rem 0 0.3rem;
            letter-spacing: 0.18em;
        }
        .hero .sub {
            font-size: 0.9rem; color: var(--light);
            letter-spacing: 0.35em;
        }
        .hero .ornament {
            display: flex; align-items: center; justify-content: center;
            gap: 1rem; margin: 1.2rem 0;
            color: var(--vermillion); font-size: 0.6rem;
        }
        .hero .ornament::before, .hero .ornament::after {
            content: ''; width: 30px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--vermillion));
        }
        .hero .ornament::after {
            background: linear-gradient(90deg, var(--vermillion), transparent);
        }

        /* Poem */
        .poem-block {
            text-align: center; padding: 1.8rem 1rem; margin: 1rem 0 2.5rem;
            position: relative;
        }
        .poem-block p {
            font-size: 1rem; color: var(--light);
            line-height: 2.4; letter-spacing: 0.05em;
        }
        .poem-block .seal {
            color: var(--vermillion); font-size: 0.75rem;
            margin-top: 0.8rem; opacity: 0.5;
        }

        /* Links row */
        .links {
            display: flex; gap: 0.8rem; justify-content: center;
            flex-wrap: wrap; margin: 0 0 3rem;
        }
        .links a {
            padding: 0.4rem 1.4rem;
            border: 1px solid var(--mist);
            text-decoration: none; color: var(--ink);
            font-size: 0.85rem; letter-spacing: 0.05em;
            transition: all 0.35s;
        }
        .links a:hover {
            border-color: var(--vermillion);
            color: var(--vermillion);
            background: rgba(184,64,64,0.03);
        }

        /* Section */
        .section { margin: 2.5rem 0; }
        .section-label {
            text-align: center;
            font-size: 0.8rem; color: var(--gold);
            letter-spacing: 0.2em;
            margin-bottom: 1.5rem;
            display: flex; align-items: center; justify-content: center; gap: 0.6rem;
        }
        .section-label::before, .section-label::after {
            content: '·'; font-size: 1.2rem; line-height: 1;
        }

        /* About */
        .about-card {
            text-align: center; max-width: 380px; margin: 0 auto;
            padding: 1.5rem;
            background: var(--soft-paper);
            border-radius: 2px;
            font-size: 0.9rem; color: var(--light);
            line-height: 2;
        }
        .about-card strong { color: var(--ink); font-weight: 500; }

        /* Stats */
        .stats-wrap {
            text-align: center; padding: 1rem;
            background: var(--soft-paper); border-radius: 2px;
            max-width: 480px; margin: 0 auto;
        }
        .stats-wrap img { max-width: 100%; height: auto; border-radius: 2px; }

        /* Footer */
        footer {
            text-align: center; padding: 3rem 1rem 2rem;
            color: var(--mist); font-size: 0.75rem;
            letter-spacing: 0.1em;
        }
        footer .chop {
            display: inline-block; width: 32px; height: 32px;
            border: 1.5px solid var(--vermillion);
            color: var(--vermillion);
            line-height: 30px; font-size: 0.65rem;
            margin-bottom: 0.6rem; opacity: 0.5;
        }

        /* Floating leaves */
        .leaf {
            position: fixed; pointer-events: none; z-index: 0;
            animation: leafFall linear forwards;
            opacity: 0.08; font-size: 1.4rem;
        }
        @keyframes leafFall {
            0% { transform: translateY(-5vh) rotate(0deg); opacity: 0; }
            15% { opacity: 0.1; }
            85% { opacity: 0.08; }
            100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 500px) {
            .hero h1 { font-size: 1.8rem; }
            .hero .avatar { width: 76px; height: 76px; }
            .hero { padding: 2.5rem 0 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-mountains"></div>
    <div class="bg-lines"></div>
    <div id="leaves"></div>

    <div class="container">
        <!-- Hero - centered on GitHub avatar -->
        <header class="hero">
            <div class="avatar-wrap">
                <img class="avatar" src="https://avatars.githubusercontent.com/u/160110426?v=4" alt="QZGeek">
            </div>
            <h1>黔中极客</h1>
            <p class="sub">QZGeek</p>
            <div class="ornament">◆</div>
        </header>

        <!-- Poem -->
        <div class="poem-block">
            <p>
                初夏新叶替落红，春景不存。<br>
                夕阳斜照城西楼，暮色迟留。
            </p>
            <div class="seal">⿅ 黔中</div>
        </div>

        <!-- Links -->
        <div class="links">
            <a href="https://qzgeek.cn">🌐 qzgeek.cn</a>
            <a href="https://github.com/qzgeek">🐙 GitHub</a>
            <a href="mailto:xcgeek@163.com">✉️ 邮件</a>
        </div>

        <!-- About -->
        <div class="section">
            <div class="section-label">关 于</div>
            <div class="about-card">
                <p>
                    嗨，我是<strong>黔中极客</strong><br>
                    一个热爱技术的在读学生<br>
                    也是开源社区的新人
                </p>
                <p style="margin-top:0.8rem; font-size:0.82rem;">
                    💻 捣鼓代码 · ☁️ 折腾服务器 · 🖋 偶尔写诗
                </p>
            </div>
        </div>

        <!-- Stats -->
        <div class="section">
            <div class="section-label">统 计</div>
            <div class="stats-wrap">
                <img src="https://awesome-github-stats.azurewebsites.net/user-stats/qzgeek?cardType=level&theme=tokyonight&preferLogin=false" alt="GitHub Stats" loading="lazy">
            </div>
        </div>

        <footer>
            <div class="chop">黔</div>
            <p>© 二〇二六 黔中极客</p>
        </footer>
    </div>

    <script>
    // Drifting leaves
    const leaves = ['🍃', '🍂', '🌿'];
    const c = document.getElementById('leaves');
    function drop() {
        const l = document.createElement('span');
        l.className = 'leaf';
        l.textContent = leaves[Math.floor(Math.random()*leaves.length)];
        l.style.left = Math.random()*95 + '%';
        l.style.animationDuration = (10+Math.random()*15) + 's';
        c.appendChild(l);
        setTimeout(() => l.remove(), 26000);
    }
    drop(); setInterval(drop, 4000);
    </script>
</body>
</html>
