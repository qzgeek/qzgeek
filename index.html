<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黔中極客 · QZGeek</title>
    <style>
        :root {
            --bg: #faf8f3;
            --card: #f4f0e8;
            --ink: #3a3632;
            --muted: #8c867a;
            --red: #b84c4c;
            --gold: #b8945c;
            --jade: #7a9e8a;
            --line: #e0d9cb;
            --light-line: #ebe4d4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--ink);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle ink texture overlay */
        body::before {
            content: ''; position: fixed; inset: 0;
            pointer-events: none; z-index: 0; opacity: 0.015;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
        }

        .container { max-width: 640px; margin: 0 auto; padding: 0 1.5rem; position: relative; z-index: 1; }

        /* ── Hero ── */
        .hero {
            text-align: center;
            padding: 5rem 0 2rem;
        }
        .avatar-ring {
            display: inline-block;
            padding: 3px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--jade), var(--gold));
            margin-bottom: 1.5rem;
        }
        .avatar-ring img {
            width: 108px; height: 108px;
            border-radius: 50%; display: block;
            border: 3px solid var(--bg);
        }
        .hero h1 {
            font-size: 2.4rem; font-weight: 600;
            letter-spacing: 0.12em;
            font-family: 'Noto Serif SC', 'STSong', serif;
        }
        .hero .sub {
            font-size: 0.88rem; color: var(--muted);
            letter-spacing: 0.35em; margin-top: 0.3rem;
            font-weight: 300;
        }

        /* ── Poem ── */
        .poem-strip {
            text-align: center;
            padding: 2rem 1rem; margin: 1.5rem 0 2.5rem;
            border-top: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
        }
        .poem-strip p {
            font-family: 'Noto Serif SC', 'STSong', serif;
            font-size: 1.05rem; color: var(--muted);
            line-height: 2.3; letter-spacing: 0.04em;
        }
        .poem-strip .dot {
            display: inline-block; width: 5px; height: 5px;
            border-radius: 50%; background: var(--red);
            margin: 1rem 0 0; opacity: 0.4;
        }

        /* ── Links ── */
        .link-bar {
            display: flex; gap: 0.8rem; justify-content: center;
            flex-wrap: wrap; margin: 0 0 3rem;
        }
        .link-bar a {
            padding: 0.45rem 1.4rem;
            border: 1px solid var(--line);
            border-radius: 20px;
            text-decoration: none; color: var(--ink);
            font-size: 0.85rem; letter-spacing: 0.04em;
            transition: all 0.3s;
            font-weight: 400;
        }
        .link-bar a:hover {
            border-color: var(--red);
            color: var(--red);
            background: rgba(184,76,76,0.03);
        }

        /* ── Section ── */
        .section { margin: 2.5rem 0; }
        .section-head {
            text-align: center;
            font-size: 0.78rem; color: var(--gold);
            letter-spacing: 0.2em;
            margin-bottom: 1.5rem;
            font-weight: 400;
        }

        /* ── About ── */
        .about-card {
            background: var(--card);
            border-radius: 12px;
            padding: 2rem 1.5rem; text-align: center;
            max-width: 400px; margin: 0 auto;
        }
        .about-card p { font-size: 0.9rem; color: var(--muted); line-height: 2; }
        .about-card strong { color: var(--ink); font-weight: 600; }

        .tag-cloud {
            display: flex; gap: 0.5rem; justify-content: center;
            flex-wrap: wrap; margin-top: 1rem;
        }
        .tag-cloud span {
            font-size: 0.75rem; color: var(--muted);
            padding: 0.2rem 0.8rem;
            border: 1px solid var(--light-line);
            border-radius: 12px;
        }

        /* ── Stats ── */
        .stats-card {
            background: var(--card);
            border-radius: 12px;
            padding: 1.5rem; text-align: center;
            max-width: 480px; margin: 0 auto;
        }
        .stats-card img { max-width: 100%; height: auto; border-radius: 8px; }

        /* ── Footer ── */
        footer {
            text-align: center; padding: 3rem 1rem 2rem;
            color: var(--muted); font-size: 0.78rem;
            letter-spacing: 0.08em; font-weight: 300;
        }
        footer .mark {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; background: var(--red);
            opacity: 0.3; margin-bottom: 0.5rem;
        }

        /* ── Ink branch decoration ── */
        .ink-branch {
            position: fixed; pointer-events: none; z-index: 0; opacity: 0.04;
        }
        .ink-branch.top-right { top: -20px; right: -40px; width: 260px; height: 200px; }
        .ink-branch.bottom-left { bottom: -30px; left: -20px; width: 200px; height: 160px; }

        /* ── Responsive ── */
        @media (max-width: 500px) {
            .hero { padding: 3rem 0 1.5rem; }
            .hero h1 { font-size: 1.8rem; }
            .avatar-ring img { width: 84px; height: 84px; }
            .poem-strip p { font-size: 0.95rem; }
            .about-card, .stats-card { padding: 1.2rem 1rem; }
        }
    </style>
</head>
<body>
    <!-- Ink branch decorations -->
    <svg class="ink-branch top-right" viewBox="0 0 260 200" xmlns="http://www.w3.org/2000/svg">
        <path d="M200,180 Q180,140 190,100 Q200,60 170,30 Q150,10 140,0" fill="none" stroke="#3a3632" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M190,100 Q160,80 140,70" fill="none" stroke="#3a3632" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M180,130 Q150,120 130,125" fill="none" stroke="#3a3632" stroke-width="1.2" stroke-linecap="round"/>
        <circle cx="140" cy="0" r="4" fill="#3a3632"/>
        <circle cx="138" cy="-5" r="3" fill="#3a3632" opacity="0.6"/>
        <circle cx="143" cy="-9" r="2" fill="#3a3632" opacity="0.3"/>
    </svg>
    <svg class="ink-branch bottom-left" viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
        <path d="M20,0 Q40,40 30,80 Q20,110 40,140 Q50,155 60,160" fill="none" stroke="#3a3632" stroke-width="2" stroke-linecap="round"/>
        <path d="M30,80 Q60,65 75,55" fill="none" stroke="#3a3632" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="65" y1="56" x2="62" y2="48" stroke="#3a3632" stroke-width="1" stroke-linecap="round"/>
        <line x1="72" y1="55" x2="74" y2="47" stroke="#3a3632" stroke-width="0.8" stroke-linecap="round"/>
    </svg>

    <div class="container">
        <!-- Hero -->
        <header class="hero">
            <div class="avatar-ring">
                <img src="https://avatars.githubusercontent.com/u/160110426?v=4" alt="QZGeek">
            </div>
            <h1>黔中極客</h1>
            <p class="sub">QZGeek</p>
        </header>

        <!-- Poem -->
        <div class="poem-strip">
            <p>
                初夏新葉替落紅，春景不存。<br>
                夕陽斜照城西樓，暮色遲留。
            </p>
            <div class="dot"></div>
        </div>

        <!-- Links -->
        <div class="link-bar">
            <a href="https://www.qzgeek.cn">📝 博客</a>
            <a href="https://github.com/qzgeek">🐙 GitHub</a>
            <a href="mailto:xcgeek@163.com">✉️ 郵件</a>
        </div>

        <!-- About -->
        <div class="section">
            <div class="section-head">關 於</div>
            <div class="about-card">
                <p>嗨，我是<strong>黔中極客</strong></p>
                <p>熱愛技術的在讀學生，開源社區的新人</p>
                <div class="tag-cloud">
                    <span>💻 代碼</span>
                    <span>☁️ 服務器</span>
                    <span>🖋 詩詞</span>
                    <span>🏔 黔地</span>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="section">
            <div class="section-head">統 計</div>
            <div class="stats-card">
                <img src="https://awesome-github-stats.azurewebsites.net/user-stats/qzgeek?cardType=level&theme=tokyonight&preferLogin=false" alt="GitHub" loading="lazy">
            </div>
        </div>

        <footer>
            <div class="mark"></div>
            <p>© 二〇二六 黔中極客</p>
        </footer>
    </div>
</body>
</html>
