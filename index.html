<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黔中极客 · QZGeek</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a2e;
            --border: #252540;
            --text: #e0e0f0;
            --muted: #7a7a9a;
            --accent: #6c8cff;
            --accent2: #a78bfa;
            --green: #4ade80;
            --orange: #fb923c;
            --pink: #f472b6;
            --cyan: #22d3ee;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 20% 0%, rgba(108,140,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(167,139,250,0.06) 0%, transparent 50%);
        }

        /* Grid overlay */
        .grid-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; opacity: 0.03;
            background-image: 
                linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; position: relative; z-index: 1; }

        /* Hero */
        .hero {
            text-align: center;
            padding: 6rem 0 4rem;
            position: relative;
        }
        .hero .avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            box-shadow: 0 0 40px rgba(108,140,255,0.3);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .hero h1 {
            font-size: 3rem; font-weight: 700;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--cyan) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }
        .hero .tagline {
            color: var(--muted);
            font-size: 1.1rem;
            font-family: 'Fira Code', monospace;
            letter-spacing: 0.1em;
        }
        .hero .typewriter {
            display: inline-block;
            border-right: 2px solid var(--accent);
            animation: blink 0.8s infinite;
            padding-right: 4px;
        }
        @keyframes blink { 50% { border-color: transparent; } }

        /* Poem card */
        .poem-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin: 2rem 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .poem-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: linear-gradient(180deg, var(--accent), var(--accent2), var(--pink));
            border-radius: 4px 0 0 4px;
        }
        .poem-card p {
            color: var(--muted);
            font-style: italic;
            line-height: 2.2;
            font-size: 1.1rem;
            font-weight: 300;
        }

        /* Link buttons */
        .links {
            display: flex; gap: 1rem;
            justify-content: center; flex-wrap: wrap;
            margin: 2rem 0;
        }
        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.7rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.95rem; font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            position: relative; overflow: hidden;
        }
        .btn::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.03));
            opacity: 0; transition: opacity 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
        .btn:hover::after { opacity: 1; }
        .btn.web { border-color: var(--accent); color: var(--accent); }
        .btn.web:hover { background: rgba(108,140,255,0.1); }
        .btn.gh { border-color: var(--green); color: var(--green); }
        .btn.gh:hover { background: rgba(74,222,128,0.1); }
        .btn.mail { border-color: var(--pink); color: var(--pink); }
        .btn.mail:hover { background: rgba(244,114,182,0.1); }

        /* Section title */
        .section-title {
            display: flex; align-items: center; gap: 0.75rem;
            margin: 3rem 0 1.5rem;
            font-size: 1.3rem; font-weight: 600;
            color: var(--text);
        }
        .section-title .icon { font-size: 1.4rem; }
        .section-title::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        /* About */
        .about-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .about-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
            transition: all 0.3s;
        }
        .about-item:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(108,140,255,0.1);
        }
        .about-item .emoji { font-size: 1.8rem; margin-bottom: 0.5rem; display: block; }
        .about-item .label { font-size: 0.85rem; color: var(--muted); }
        .about-item .value { font-size: 1.05rem; font-weight: 500; color: var(--text); }

        /* Stats card */
        .stats-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            text-align: center;
            transition: border-color 0.3s;
        }
        .stats-card:hover { border-color: var(--accent2); }
        .stats-card img {
            max-width: 100%; height: auto;
            border-radius: 8px;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        }
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1rem 0;
        }
        @media (max-width: 640px) {
            .stats-row { grid-template-columns: 1fr; }
            .hero h1 { font-size: 2rem; }
            .hero { padding: 4rem 0 2rem; }
        }

        /* Timeline */
        .timeline { position: relative; padding-left: 2rem; margin: 2rem 0; }
        .timeline::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, var(--accent), var(--accent2), var(--pink));
        }
        .timeline-item {
            position: relative;
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
        }
        .timeline-item::before {
            content: ''; position: absolute; left: -2.35rem; top: 0.5rem;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid var(--surface);
            box-shadow: 0 0 10px rgba(108,140,255,0.5);
        }
        .timeline-item .date {
            font-size: 0.8rem; color: var(--muted);
            font-family: 'Fira Code', monospace;
        }
        .timeline-item .content {
            color: var(--text);
            font-size: 0.95rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem 1rem 2rem;
            color: var(--muted);
            font-size: 0.85rem;
        }
        footer .heart { color: var(--pink); animation: pulse 1.5s ease-in-out infinite; display: inline-block; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Fade-in animation */
        .fade-in {
            opacity: 0; transform: translateY(20px);
            animation: fadeIn 0.6s ease-out forwards;
        }
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="grid-overlay"></div>

    <div class="container">
        <!-- Hero -->

            <h1>黔中极客</h1>

        <!-- Poem -->
        <div class="poem-card fade-in delay-1">

        <div class="links fade-in delay-2">

        <footer class="fade-in">
            <p>© 2025–2026 黔中极客 · Built with <span class="heart">❤️</span> on GitHub Pages</p>

    </div>
</body>
</html>
